<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>종합 랭킹</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; background: #fff; }
    .header { position: sticky; top: 0; background: #fff; border-bottom: 1px solid #eee; z-index: 10; }
    .tabs { display: flex; }
    .tab { flex: 1; text-align: center; padding: 15px; font-weight: bold; color: #bbb; cursor: pointer; }
    .tab.active { color: #000; border-bottom: 2px solid #000; }
    .list { padding: 0 15px; }
    .item { display: flex; padding: 15px 0; border-bottom: 1px solid #f2f2f2; gap: 15px; }
    .img-box { width: 110px; min-width: 110px; height: 160px; border-radius: 4px; overflow: hidden; background: #eee; position: relative; }
    .img-box img { width: 100%; height: 100%; object-fit: cover; }
    .rank-overlay { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.7); color: white; padding: 2px 6px; border-radius: 3px; font-size: 0.9rem; }
    .info-box { flex: 1; }
    .title { font-size: 1.1rem; font-weight: bold; margin: 0 0 8px 0; line-height: 1.3; }
    .data-line { display: flex; align-items: center; font-size: 0.9rem; color: #555; margin-bottom: 5px; gap: 5px; }
    .data-label { font-size: 0.8rem; color: #888; margin-left: auto; }
    .icon { width: 16px; height: 16px; fill: #007bff; }
  </style>
</head>
<body>
<div class="header">
  <div class="tabs">
    <div class="tab active" onclick="loadData('movie', this)">영화</div>
    <div class="tab" onclick="loadData('book', this)">도서</div>
  </div>
</div>
<div class="list" id="list"></div>

<script>
  const icons = {
    audi: '<svg class="icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>',
    won: '<svg class="icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.16-1.46-3.27-3.4h1.96c.1 1.05.82 1.87 2.65 1.87 1.96 0 2.4-.98 2.4-1.59 0-.83-.44-1.61-2.67-2.14-2.48-.6-4.18-1.62-4.18-3.97 0-1.82 1.28-3.26 3.11-3.66V3h2.67v1.96c1.49.33 2.66 1.25 3.04 2.82h-1.93c-.36-1.02-1.06-1.33-2.17-1.33-1.61 0-2.16.84-2.16 1.45 0 .99.63 1.48 2.81 2.01 2.58.63 4.04 1.77 4.04 4.1 0 1.93-1.35 3.32-3.14 3.75z"/></svg>'
  };

  async function loadData(type, el) {
    if(el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }
    const listDiv = document.getElementById('list');
    listDiv.innerHTML = '<p style="text-align:center; padding:20px;">로딩 중...</p>';

    try {
      const res = await fetch(`/api/rankings?type=${type}`, { headers: { "ngrok-skip-browser-warning": "true" } });
      const data = await res.json();

      listDiv.innerHTML = data.map(m => {
        const isMovie = (type === 'movie');
        return `
          <div class="item">
            <div class="img-box">
              <img src="${m.img}" onerror="this.src='https://via.placeholder.com/110x160?text=No+Image'">
              <div class="rank-overlay">${m.rank}</div>
            </div>
            <div class="info-box">
              <h3 class="title">${m.title}</h3>
              <div class="data-line">
                ${isMovie ? icons.audi : '👤'} 
                <div style="margin-left:5px">${isMovie ? parseInt(m.audiCnt).toLocaleString() + '명' : m.info1}</div>
                ${isMovie ? `<div class="data-label">(누적:${parseInt(m.totalAudiCnt).toLocaleString()}명)</div>` : ''}
              </div>
              <div class="data-line">
                ${icons.won}
                <div>${isMovie ? parseInt(m.salesAmt).toLocaleString() + '원' : m.info3}</div>
                <div class="data-label">${isMovie ? `(누적:${parseInt(m.totalSalesAmt).toLocaleString()}원)` : `(${m.info2})`}</div>
              </div>
              <div class="data-line" style="margin-top: 5px;">
                <div style="font-size: 0.8rem; color: #777;">${isMovie ? '상영횟수' : '출판사'}</div>
                <div style="font-weight: bold; margin-left: 5px;">${isMovie ? parseInt(m.showCnt).toLocaleString() : m.info2}</div>
              </div>
            </div>
          </div>`;
      }).join('');
    } catch(e) {
      listDiv.innerHTML = '<p style="text-align:center;">데이터를 가져오지 못했습니다.</p>';
    }
  }
  loadData('movie');
</script>
</body>
</html>
