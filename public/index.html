<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>버스 도착 정보</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
.stationBox {
  width: 100%;
  max-width: 500px;
  margin: 20px auto;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}

/* 🔥 정류소 헤더 */
.stationHeader {
  color: white;
  padding: 15px;
}

/* 색상 다양화 */
.blue { background: #2f7f95; }
.green { background: #34c759; }
.orange { background: #ff9500; }

.stationTitle {
  font-weight: bold;
  font-size: 15px;
}

.stationDir {
  font-size: 13px;
  opacity: 0.9;
}

/* 업데이트 */
.update {
  padding: 10px 15px;
  background: #f9f9f9;
  border-bottom: 1px solid #ddd;
}

/* 테이블 */
table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #f0f0f0;
  padding: 10px;
}

td {
  padding: 12px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

/* 가독성 */
tr:nth-child(even) {
  background: #fafafa;
}

/* 강조 */
.fast { color: #ff3b30; font-weight: bold; }
.slow { color: #007aff; font-weight: bold; }
.gray { color: #999; }
</style>
</head>

<body>

<div id="updateGlobal" style="text-align:center; margin:10px; font-weight:bold;"></div>
<div id="container"></div>




<script>
 const stations = [
  { id: "2306", color: "blue"},
  { id: "1250", color: "green" },
  { id: "10", color: "green" },
  
  { id: "9", color: "green" },
  { id: "4", color: "green" }
];

function formatTime() {
  return new Date().toLocaleString("ko-KR");
}

function getClass(time) {
  if (!time) return "gray";
  if (time.includes("곧")) return "fast";

  const num = time.match(/\d+/);
  if (!num) return "gray";

  const min = parseInt(num[0]);
  if (min <= 3) return "fast";
  if (min <= 10) return "slow";
  return "gray";
}



async function loadAll() {

  document.getElementById("updateGlobal").innerText =
  "업데이트 시간: " + formatTime();

  const container = document.getElementById("container");

  for (const station of stations) {
    // 🔽 이 부분을 수정합니다.
    const res = await fetch(`/bus?mode=BUS_ARRIVAL&keyword=${station.id}&menu=4&smenu=1&lobs=`, {
      headers: {
        "ngrok-skip-browser-warning": "true" // 아무 값이나 넣으면 경고창이 사라집니다.
      }
    });
    
    const xmlStr = await res.text();

    /*
    const res = await fetch(`/bus?mode=BUS_ARRIVAL&keyword=${station.id}&menu=4&smenu=1&lobs=`);
    const xmlStr = await res.text();  */

    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlStr, "text/xml");

    const bData = xml.getElementsByTagName("b_data")[0];
    if (!bData) continue;

    const name = bData.getAttribute("d3");
    const dir = bData.getAttribute("d7");
    const stationId = bData.getAttribute("d8");

    // ✅ 기존 카드 찾기
    let box = document.getElementById(`station-${station.id}`);

    // ✅ 없으면 생성 (최초 1번만)
    if (!box) {
      box = document.createElement("div");
      box.id = `station-${station.id}`;
      box.className = "stationBox";

      box.innerHTML = `
        <div class="stationHeader ${station.color}">
          <div class="stationTitle"></div>
        </div>

        

        <table>
          <thead>
            <tr>
              <th>노선</th>
              <th>도착예정</th>
              <th>현재위치</th>
              <th>종점</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      `;

      container.appendChild(box);
    }

    // ✅ 헤더 업데이트 (깜빡임 없음)
  box.querySelector(".stationTitle").innerText =
  `📍 ${name} (${stationId}) → ${dir} 방향`;

   

    // ✅ tbody만 갱신
    const tbody = box.querySelector("tbody");
    tbody.innerHTML = "";

    const items = xml.getElementsByTagName("data");

    const targetBuses = ["9", "21-1"];

    Array.from(items).forEach(item => {
      const bus = item.getAttribute("d1");
      if (!targetBuses.includes(bus)) return;
      const time = item.getAttribute("d4") || "정보없음";
      const loc = item.getAttribute("d3");
      const dest = item.getAttribute("d5");

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${bus}</td>
        <td class="${getClass(time)}">${time}</td>
        <td>${loc}</td>
        <td>${dest}</td>
      `;

      tbody.appendChild(tr);
    });
  


    
  }
}

loadAll();
setInterval(loadAll, 15000);
 </script>

</body>
</html>
