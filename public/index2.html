<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>버스 도착 정보</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
 body {
  background: #eee;
  font-family: -apple-system, BlinkMacSystemFont;
}

#direction {
  color: #dfefff;
}

.modal {
  width: 100%;
  max-width: 500px;
  margin: 20px auto;
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.header {
  background: #2f7f95;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title {
  font-weight: bold;
}

.actions button {
  background: transparent;
  border: none;
  color: white;
  font-size: 18px;
  margin-left: 10px;
  cursor: pointer;
}

.update {
  padding: 10px 15px;
  border-bottom: 1px solid #ddd;
  font-size: 14px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #f5f5f5;
  padding: 10px;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
}

td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

.fast {
  color: red;
  font-weight: bold;
}

.slow {
  color: #007aff;
}

.gray {
  color: #999;
}
</style>
</head>

<body>

<div class="modal">
  <div class="header">
    <div class="title">
  <div id="stationName"></div>
  <div id="direction" style="font-size:13px; opacity:0.9;"></div>
</div>
    <div class="actions">
      <button onclick="loadBus()">⟳</button>
      <button onclick="closeModal()">✕</button>
    </div>
  </div>

  <div class="update" id="updateTime"></div>

  <table>
    <thead>
      <tr>
        <th>노선</th>
        <th>도착예정</th>
        <th>현재위치</th>
        <th>종점</th>
      </tr>
    </thead>
    <tbody id="busTable"></tbody>
  </table>
</div>


<script>
function formatTime() {
  return new Date().toLocaleString("ko-KR");
}

function getClass(time) {
  if (!time) return "gray";
  if (time.includes("곧")) return "fast";

  const num = time.match(/\d+/);
  if (!num) return "gray";

  const min = parseInt(num[0]);
  if (min <= 3) return "fast";
  if (min <= 10) return "slow";
  return "gray";
}

// ✅ 위치 가져오기
function getMyLocation() {
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(
      pos => {
        resolve({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude
        });
      },
      err => reject(err),
      { enableHighAccuracy: true, timeout: 5000 }
    );
  });
}

// ✅ 주변 정류장
async function getNearbyStations(lat, lng) {
  const url = `https://apis.data.go.kr/1613000/BusSttnInfoInqireService/getCrdntPrxmtSttnList?serviceKey=l%2FzPvuFgDbYOsgQY1kCLbjHytfR1nkkyR2KZVENTPtDNQR4AD0jG%2BvGf2fBA052nrh0HF4QJW%2FMFXxt2HKP5sg%3D%3D&pageNo=1&numOfRows=5&_type=json&gpsLati=${lat}&gpsLong=${lng}`;

  const res = await fetch(url);
  const data = await res.json();

  return data.response.body.items.item;
}

// ✅ 메인
async function loadNearbyAll() {
  try {
    document.getElementById("updateGlobal").innerText =
      "업데이트 시간: " + formatTime();

    const container = document.getElementById("container");

    const pos = await getMyLocation();
    const stations = await getNearbyStations(pos.lat, pos.lng);

    // 색 자동
    const colors = ["blue", "green", "orange"];

    for (let i = 0; i < stations.length; i++) {
      const st = stations[i];
      const stationId = st.nodeno;
      const color = colors[i % colors.length];

      const res = await fetch(`/bus?mode=BUS_ARRIVAL&keyword=${stationId}&menu=4&smenu=1&lobs=`);
      const xmlStr = await res.text();

      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlStr, "text/xml");

      const bData = xml.getElementsByTagName("b_data")[0];
      if (!bData) continue;

      const name = bData.getAttribute("d3");
      const dir = bData.getAttribute("d7");
      const id = bData.getAttribute("d8");

      let box = document.getElementById(`station-${stationId}`);

      if (!box) {
        box = document.createElement("div");
        box.id = `station-${stationId}`;
        box.className = "stationBox";

        box.innerHTML = `
          <div class="stationHeader ${color}">
            <div class="stationTitle"></div>
          </div>

          <table>
            <thead>
              <tr>
                <th>노선</th>
                <th>도착예정</th>
                <th>현재위치</th>
                <th>종점</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        `;

        container.appendChild(box);
      }

      box.querySelector(".stationTitle").innerText =
        `📍 ${name} (${id}) → ${dir} 방향`;

      const tbody = box.querySelector("tbody");
      tbody.innerHTML = "";

      const items = xml.getElementsByTagName("data");

      const targetBuses = ["9", "21-1"];

      Array.from(items).forEach(item => {
        const bus = item.getAttribute("d1");
        if (!targetBuses.includes(bus)) return;

        const time = item.getAttribute("d4") || "정보없음";
        const loc = item.getAttribute("d3");
        const dest = item.getAttribute("d5");

        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${bus}</td>
          <td class="${getClass(time)}">${time}</td>
          <td>${loc}</td>
          <td>${dest}</td>
        `;

        tbody.appendChild(tr);
      });
    }

  } catch (e) {
    console.error(e);
    alert("위치 오류: " + e.message);
  }
}

// 실행
loadNearbyAll();
setInterval(loadNearbyAll, 15000);
</script>

</body>
</html>
