<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>버스 도착 정보</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
 body {
  background: #eee;
  font-family: -apple-system, BlinkMacSystemFont;
}

#direction {
  color: #dfefff;
}

.modal {
  width: 100%;
  max-width: 500px;
  margin: 20px auto;
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.header {
  background: #2f7f95;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title {
  font-weight: bold;
}

.actions button {
  background: transparent;
  border: none;
  color: white;
  font-size: 18px;
  margin-left: 10px;
  cursor: pointer;
}

.update {
  padding: 10px 15px;
  border-bottom: 1px solid #ddd;
  font-size: 14px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #f5f5f5;
  padding: 10px;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
}

td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

.fast {
  color: red;
  font-weight: bold;
}

.slow {
  color: #007aff;
}

.gray {
  color: #999;
}
</style>
</head>

<body>

<div class="modal">
  <div class="header">
    <div class="title">
  <div id="stationName"></div>
  <div id="direction" style="font-size:13px; opacity:0.9;"></div>
</div>
    <div class="actions">
      <button onclick="loadBus()">⟳</button>
      <button onclick="closeModal()">✕</button>
    </div>
  </div>

  <div class="update" id="updateTime"></div>

  <table>
    <thead>
      <tr>
        <th>노선</th>
        <th>도착예정</th>
        <th>현재위치</th>
        <th>종점</th>
      </tr>
    </thead>
    <tbody id="busTable"></tbody>
  </table>
</div>

<script>
  function formatTime() {
  const now = new Date();
  return now.toLocaleString("ko-KR");
}

function getClass(time) {
  if (!time) return "gray";

  const num = time.match(/\d+/);
  if (!num) return "gray";

  const min = parseInt(num[0]);

  if (min <= 3) return "fast";
  if (min <= 10) return "slow";
  return "gray";
}

async function getNearbyStations(lat, lng) {
//console.log(lat, lng)  

const url = `https://apis.data.go.kr/1613000/BusSttnInfoInqireService/getCrdntPrxmtSttnList?serviceKey=l%2FzPvuFgDbYOsgQY1kCLbjHytfR1nkkyR2KZVENTPtDNQR4AD0jG%2BvGf2fBA052nrh0HF4QJW%2FMFXxt2HKP5sg%3D%3D&pageNo=1&numOfRows=10&_type=json&gpsLati=${lat}&gpsLong=${lng}`;

  const res = await fetch(url);
  const data = await res.json();

  return data.response.body.items.item;
}

function getMyLocation() {
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(
      pos => {
        resolve({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude
        });
      },
      err => reject(err)
    );
  });
}

async function loadNearbyBus() {
  try {
    const myPos = await getMyLocation();
    const lng = "128.8370211" 
     const lat = "35.233609"
     const stations = await getNearbyStations(lat, lng);
   // const stations = await getNearbyStations(myPos.lat, myPos.lng);

    console.log("주변 정류장:", stations);

    // 👉 여러 정류장 처리
   const nearest = stations[0];
   loadBusById(nearest.nodeno-1000);

  } catch (e) {
  console.error(e); // ⭐ 추가
  alert("위치 오류: " + e.message);
}
}

async function loadBusById(stationId) {
  const res = await fetch(`/bus?mode=BUS_ARRIVAL&keyword=${stationId}&menu=4&smenu=1&lobs=`);
  const xmlStr = await res.text();

  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlStr, "text/xml");

  const items = xml.getElementsByTagName("data");
  const tbody = document.getElementById("busTable");

  // ✅ 정류소 정보


const bData = xml.getElementsByTagName("b_data")[0];

if (bData) {
  const stationName = bData.getAttribute("d3");
  const direction = bData.getAttribute("d7");
  const stationId = bData.getAttribute("d8");

  document.getElementById("stationName").innerText =
    `📍 ${stationName} (${stationId})`;

  document.getElementById("direction").innerText =
    `→ ${direction} 방향`;
}

  tbody.innerHTML = "";

  Array.from(items).forEach(item => {
    const bus = item.getAttribute("d1");
    const time = item.getAttribute("d4") || "정보없음";
    const loc = item.getAttribute("d3");
    const dest = item.getAttribute("d5");

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${bus}</td>
      <td class="${getClass(time)}">${time}</td>
      <td>${loc}</td>
      <td>${dest}</td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById("updateTime").innerText =
    "업데이트 시간: " + formatTime();
}

function closeModal() {
  document.querySelector(".modal").style.display = "none";
}

// 최초 실행
loadNearbyBus();
setInterval(loadNearbyBus, 15000);
</script>

</body>
</html>
